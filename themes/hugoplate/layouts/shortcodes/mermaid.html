<div class="bg-light dark:bg-darkmode-light p-8 rounded-md mb-6 not-prose">
  <div class="mermaid">
    {{ .Inner | safeHTML }}
  </div>
</div>

{{/* Get theme parameter */}}
{{ $theme := .Get "theme" | default "default" }}

<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11.12.1/+esm";

  const specifiedTheme = "{{ $theme }}" || "default";

  // Store original content
  function storeOriginalContent() {
    document.querySelectorAll('.mermaid').forEach(element => {
      if (!element.hasAttribute('data-original')) {
        element.setAttribute('data-original', element.textContent.trim());
      }
    });
  }

  // Get effective theme based on dark mode
  function getEffectiveTheme(isDarkMode) {
    return isDarkMode ? 'dark' : specifiedTheme;
  }

  // Build mermaid config
  function getMermaidConfig(isDarkMode, startOnLoad = true) {
    return {
      startOnLoad,
      theme: getEffectiveTheme(isDarkMode),
      securityLevel: "loose",
      flowchart: { curve: "basis" }
    };
  }

  // Remove theme config from diagram code in dark mode
  function processContent(content, isDarkMode) {
    if (!isDarkMode) return content;
    
    // In dark mode, remove theme settings from frontmatter config
    return content.replace(/(---\s*\n(?:.*\n)*?config:\s*\n)((?:.*\n)*?)(---)/m, (match, before, configContent, after) => {
      // Remove theme and themeVariables lines
      const lines = configContent.split('\n');
      const filtered = lines.filter(line => {
        // Skip theme line
        if (/^\s*theme:/.test(line)) return false;
        // Skip themeVariables line
        if (/^\s*themeVariables:/.test(line)) {
          // Also need to skip the nested properties
          const idx = lines.indexOf(line);
          const indent = line.search(/\S/);
          // Mark following indented lines for removal
          for (let i = idx + 1; i < lines.length; i++) {
            const nextIndent = lines[i].search(/\S/);
            if (lines[i].trim() && nextIndent > indent) {
              lines[i] = null; // Mark for removal
            } else {
              break;
            }
          }
          return false;
        }
        return line !== null;
      });
      
      return before + filtered.join('\n') + after;
    });
  }

  // Rerender all diagrams
  function rerenderDiagrams() {
    const isDark = document.documentElement.classList.contains('dark');
    document.querySelectorAll('.mermaid').forEach(element => {
      const originalContent = element.getAttribute('data-original');
      if (originalContent) {
        const content = processContent(originalContent, isDark);
        element.innerHTML = content;
        element.removeAttribute('data-processed');
      }
    });
    mermaid.run();
  }

  // Initial setup
  document.addEventListener('DOMContentLoaded', () => {
    const isDark = document.documentElement.classList.contains('dark');
    
    // Store and process content for initial render
    document.querySelectorAll('.mermaid').forEach(element => {
      if (!element.hasAttribute('data-original')) {
        const originalContent = element.textContent.trim();
        element.setAttribute('data-original', originalContent);
        
        // Process content for dark mode on initial load
        const content = processContent(originalContent, isDark);
        element.innerHTML = content;
      }
    });
  });

  const isDarkMode = document.documentElement.classList.contains('dark');
  mermaid.initialize(getMermaidConfig(isDarkMode));

  // Watch for dark mode changes
  new MutationObserver(mutations => {
    if (mutations.some(m => m.attributeName === 'class')) {
      const isDark = document.documentElement.classList.contains('dark');
      mermaid.initialize(getMermaidConfig(isDark, false));
      rerenderDiagrams();
    }
  }).observe(document.documentElement, {
    attributes: true,
    attributeFilter: ['class']
  });
</script>
